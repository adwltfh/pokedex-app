name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Image Name
        run: |
          DOCKER_IMAGE=ghcr.io/${{ github.repository_owner }}/pokedex
          echo "IMAGE_NAME=${DOCKER_IMAGE,,}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-vps:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Set Image Name
        run: |
          DOCKER_IMAGE=ghcr.io/${{ github.repository_owner }}/pokedex
          echo "IMAGE_NAME=${DOCKER_IMAGE,,}" >> $GITHUB_ENV

      - name: Deploy via SSH to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}

          script: |
            DOCKER_IMAGE="ghcr.io/${{ github.repository_owner }}/pokedex"
            IMAGE_LOWER=$(echo "$DOCKER_IMAGE" | tr '[:upper:]' '[:lower:]')

            mkdir -p /var/www/pokedex

            cat > /var/www/pokedex/docker_compose.yml << 'EOF'
            services:
              pokedex:
                container_name: pokedex
                image: ${IMAGE_NAME}:latest
                ports:
                  - "0307:0307"
                environment:
                  - NODE_ENV=production
                  - PORT=0307
                restart: unless-stopped
            EOF

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker pull $IMAGE_LOWER:latest

            cd /var/www/pokedex
            IMAGE_NAME=$IMAGE_LOWER docker compose up -d

            docker image prune -af
